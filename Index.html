<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dumpling Blaster" />
<title>Dumpling Blaster</title>
<style>
  * { box-sizing:border-box; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; margin:0; padding:0; }
  html,body { height:100%; background:#05030F; overscroll-behavior:none;
    font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif; color:#EAF0FF; touch-action:manipulation; }
  #app { position:fixed; inset:0; display:flex; flex-direction:column; overflow:hidden; }
  button { font-family:inherit; -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  .center { align-items:center; justify-content:center; text-align:center; padding:24px; overflow-y:auto; }
  .bigbtn { background:linear-gradient(135deg,#FF4D8D,#FFC24B); color:#05030F; border:none;
    border-radius:16px; padding:16px 40px; font-size:22px; font-weight:800; cursor:pointer;
    letter-spacing:.5px; box-shadow:0 6px 0 rgba(0,0,0,.35); }
  .subbtn { background:#252A63; color:#EAF0FF; }
  .ans { flex:1; min-height:64px; padding:10px 0; font-size:clamp(24px,4vh,30px); font-weight:900;
    color:#EAF0FF; background:#252A63; border:none; border-radius:14px; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.4); transition:background .12s; }
  .ans.right { background:#4BE38A; color:#05030F; }
  .ans.wrong { background:#FF5C5C; color:#05030F; }
  @keyframes confetti { 0%{transform:translate(0,0) rotate(0);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0} }
  @keyframes pop { 0%{transform:translate(-50%,-50%) scale(.3);opacity:0} 20%{transform:translate(-50%,-50%) scale(1.15);opacity:1} 70%{transform:translate(-50%,-50%) scale(1);opacity:1} 100%{transform:translate(-50%,-90%) scale(.9);opacity:0} }
  @keyframes zap { 0%{transform:translateX(-50%) scaleY(0);opacity:1} 60%{transform:translateX(-50%) scaleY(1);opacity:1} 100%{transform:translateX(-50%) scaleY(1);opacity:0} }
  @keyframes boom { 0%{transform:translate(-50%,-50%) scale(.2);opacity:1} 100%{transform:translate(-50%,-50%) scale(2.4);opacity:0} }
  @keyframes twinkle { 0%,100%{opacity:.25} 50%{opacity:1} }
  @keyframes banner { 0%{transform:translateX(-50%) scale(.7);opacity:0} 20%{transform:translateX(-50%) scale(1);opacity:1} 80%{opacity:1} 100%{opacity:0} }
  @keyframes hover { 0%,100%{transform:translate(-50%,-50%) translateY(0)} 50%{transform:translate(-50%,-50%) translateY(-6px)} }
  @keyframes eggShake { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-12deg)} 40%{transform:rotate(10deg)} 60%{transform:rotate(-8deg)} 80%{transform:rotate(6deg)} }
  @keyframes eggGone { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.4);opacity:0} }
  @keyframes hatchIn { 0%{transform:scale(0) translateY(20px);opacity:0} 55%{transform:scale(1.25);opacity:1} 75%{transform:scale(.92)} 100%{transform:scale(1);opacity:1} }
  @keyframes hearts { 0%{transform:translateY(0) scale(.6);opacity:0} 30%{opacity:1} 100%{transform:translateY(-70px) scale(1.1);opacity:0} }
  @keyframes dumpOpen { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(-26px) rotate(-12deg);opacity:0} }
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
// ─────────────────────────────────────────────────────────────
//  DUMPLING BLASTER — pure JS, no dependencies, fully offline
// ─────────────────────────────────────────────────────────────
var C = { bg:"#05030F", hud:"#0E1030", panel:"#1A1E4A", panelLite:"#252A63",
  cyan:"#3DE1FF", magenta:"#FF4D8D", amber:"#FFC24B", green:"#4BE38A", red:"#FF5C5C",
  laser:"#7CFF6B", text:"#EAF0FF", dim:"#8B93C7", bamboo:"#C79A5B", bambooDark:"#9C7038" };

var MAX = 10, FAST_MS = 3500;
var PRIZES = ["⭐","💎","🍬","🌟","🏅","🎁","🦄","🌈","👑","🍭"];
var CREATURES = [
  {emoji:"🐶",name:"Puppy"},{emoji:"🐱",name:"Kitten"},{emoji:"🐣",name:"Chick"},
  {emoji:"🐰",name:"Bunny"},{emoji:"🦊",name:"Fox kit"},{emoji:"🐼",name:"Panda cub"},
  {emoji:"🐨",name:"Koala"},{emoji:"🦄",name:"Baby unicorn"},{emoji:"🐧",name:"Penguin"},
  {emoji:"🦖",name:"Lil dino"},{emoji:"🐙",name:"Octo-pal"},{emoji:"🦔",name:"Hedgehog"}
];
var LEVELS = [
  {name:"Deep Space",   scoreToClear:120, sky:["#0A0620","#1A1050"], enemy:"👾", accent:"#7CFF6B", stars:"#ffffff"},
  {name:"Nebula Cloud", scoreToClear:300, sky:["#2A0A3E","#5B1E6E"], enemy:"🛸", accent:"#FF4D8D", stars:"#FFD6F5"},
  {name:"Asteroid Belt",scoreToClear:560, sky:["#241203","#6E3A1E"], enemy:"☄️", accent:"#FFC24B", stars:"#FFE9C7"},
  {name:"Ice Rings",    scoreToClear:900, sky:["#052033","#0E5B6E"], enemy:"❄️", accent:"#3DE1FF", stars:"#D7F6FF"},
  {name:"Galaxy Core",  scoreToClear:Infinity, sky:["#1A0322","#3A0C4E"], enemy:"🌟", accent:"#C77CFF", stars:"#F0D7FF"}
];

// ── persistence ──
function load(){ try{ return JSON.parse(localStorage.getItem("dumplingBlaster"))||{best:0,collection:{}}; }catch(e){ return {best:0,collection:{}}; } }
function save(d){ try{ localStorage.setItem("dumplingBlaster", JSON.stringify(d)); }catch(e){} }
var saved = load();

// ── game state ──
var S = {
  screen:"home", best:saved.best||0, collection:saved.collection||{},
  score:0, lives:3, streak:0, levelIdx:0,
  problem:null, feedback:null, dumplings:0, rescued:[], masteredTables:[],
  targets:[], lasers:[], tableProgress:{}, misses:{}, asked:0, tid:0,
  running:false, lastSpawn:0, over:{}
};

function makeProblem(){
  var a=2+Math.floor(Math.random()*(MAX-1)), b=2+Math.floor(Math.random()*(MAX-1));
  var correct=a*b, set={}; set[correct]=1;
  var guard=0;
  while(Object.keys(set).length<3 && guard++<40){
    var off=correct+(Math.floor(Math.random()*7)-3)*(Math.random()>.5?a:b);
    if(off>0) set[off]=1;
  }
  var k=2; while(Object.keys(set).length<3){ set[correct+k]=1; k++; }
  var choices=Object.keys(set).map(Number).sort(function(){return Math.random()-.5;});
  return {a:a,b:b,answer:correct,choices:choices};
}

var app = document.getElementById("app");

// ── tiny DOM helper ──
function el(tag, style, html){
  var e=document.createElement(tag);
  if(style) e.setAttribute("style", style);
  if(html!=null) e.innerHTML=html;
  return e;
}

// ═══════════════ RENDER: HOME ═══════════════
function renderHome(){
  S.screen="home";
  app.className="center";
  app.setAttribute("style","position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;overflow-y:auto;background:radial-gradient(circle at 50% 20%, "+LEVELS[0].sky[1]+", "+C.bg+" 70%);");
  app.innerHTML="";

  app.appendChild(el("div","font-size:13px;letter-spacing:4px;color:"+C.cyan+";font-weight:700","TIMES-TABLE SPACE DEFENSE"));
  app.appendChild(el("h1","font-size:clamp(40px,11vw,80px);margin:8px 0 0;line-height:.95;font-weight:900;background:linear-gradient(135deg,"+C.cyan+","+C.magenta+");-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text","Dumpling<br>Blaster"));
  app.appendChild(el("p","color:"+C.dim+";max-width:400px;margin-top:16px;font-size:16px",
    "Blast the invaders to save the world's cutest dumpling creatures! 🥟💕 Each alien carries a times-table problem — pick the right answer to <b style='color:"+C.laser+"'>fire your laser</b>. Keep a streak going and rescue eggs will <b style='color:"+C.amber+"'>hatch adorable friends</b> for you."));

  var btn=el("button","","Launch ▸"); btn.className="bigbtn";
  btn.style.marginTop="26px"; btn.onclick=startGame;
  app.appendChild(btn);

  if(S.best>0) app.appendChild(el("div","margin-top:18px;color:"+C.amber+";font-weight:700","Best score: "+S.best));

  app.appendChild(el("div","margin-top:22px;color:"+C.dim+";font-size:13px;max-width:340px;line-height:1.7",
    "⚡ Answer fast → bonus points<br>✨ 3 in a row → triple shot (blast 3 at once)<br>🥚 8 in a row → hatch a cute rescued creature<br>💣 10 in a row → MEGA BOMB clears the screen<br>🌍 Climb through 5 space levels<br>❤️ 3 lives — don't let them slip past"));

  var kinds=Object.keys(S.collection);
  if(kinds.length>0){
    var box=el("div","margin-top:24px;background:"+C.panel+";border-radius:16px;padding:14px 20px;max-width:360px");
    box.appendChild(el("div","color:"+C.amber+";font-weight:800;font-size:13px;letter-spacing:1px","🏡 YOUR RESCUED FRIENDS"));
    var row=el("div","margin-top:10px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center");
    kinds.forEach(function(emoji){
      var info=S.collection[emoji];
      var cell=el("div","text-align:center;width:52px;position:relative");
      cell.appendChild(el("div","font-size:32px",emoji));
      if(info.count>1) cell.appendChild(el("div","position:absolute;top:-2px;right:2px;background:"+C.magenta+";color:"+C.bg+";font-size:10px;font-weight:900;border-radius:999px;padding:1px 5px","×"+info.count));
      cell.appendChild(el("div","font-size:9px;color:"+C.dim,info.name));
      row.appendChild(cell);
    });
    box.appendChild(row);
    box.appendChild(el("div","margin-top:8px;color:"+C.dim+";font-size:11px",kinds.length+" of "+CREATURES.length+" kinds collected"));
    var reset=el("div","margin-top:10px;color:"+C.dim+";font-size:11px;text-decoration:underline;cursor:pointer","Reset progress");
    reset.onclick=function(){ if(confirm("Reset best score and rescued friends?")){ S.collection={}; S.best=0; save({best:0,collection:{}}); renderHome(); } };
    box.appendChild(reset);
    app.appendChild(box);
  }
}

// ═══════════════ START ═══════════════
function startGame(){
  S.score=0; S.lives=3; S.streak=0; S.levelIdx=0;
  S.dumplings=0; S.rescued=[]; S.masteredTables=[];
  S.targets=[]; S.lasers=[]; S.tableProgress={}; S.misses={};
  S.feedback=null; S.tid=0; S.lastSpawn=performance.now();
  S.problem=makeProblem(); S.asked=Date.now();
  S.screen="play"; S.running=true;
  buildPlay();
  showBanner(LEVELS[0].name);
  requestAnimationFrame(loop);
}

// ═══════════════ BUILD PLAY SCENE (static shell) ═══════════════
var refs={};
function buildPlay(){
  var lvl=LEVELS[Math.min(S.levelIdx,LEVELS.length-1)];
  app.className="";
  app.setAttribute("style","position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient("+lvl.sky[0]+","+lvl.sky[1]+")");
  app.innerHTML="";

  // starfield
  var stars=el("div","position:absolute;inset:0;z-index:1;pointer-events:none");
  for(var i=0;i<26;i++){
    stars.appendChild(el("div","position:absolute;top:"+((i*37)%100)+"%;left:"+((i*61)%100)+"%;width:3px;height:3px;border-radius:50%;background:"+lvl.stars+";opacity:.5;animation:twinkle "+(2+(i%4))+"s ease-in-out "+(i*0.2)+"s infinite"));
  }
  app.appendChild(stars); refs.stars=stars;

  // overlays layer (confetti, reward pops, hatch, banner, bomb)
  refs.overlay=el("div","position:absolute;inset:0;z-index:26;pointer-events:none");
  app.appendChild(refs.overlay);

  // HUD
  var hud=el("div","display:flex;justify-content:space-between;align-items:center;padding:12px 16px 6px;z-index:12");
  refs.score=el("div","font-weight:900;font-size:22px;color:"+C.cyan);
  var mid=el("div","text-align:center");
  refs.lives=el("div","font-size:18px");
  refs.levelName=el("div","font-size:11px;color:"+lvl.accent+";font-weight:700;letter-spacing:1px");
  mid.appendChild(refs.lives); mid.appendChild(refs.levelName);
  refs.dump=el("div","font-weight:900;font-size:16px;color:"+C.bamboo);
  hud.appendChild(refs.score); hud.appendChild(mid); hud.appendChild(refs.dump);
  app.appendChild(hud);

  refs.streak=el("div","text-align:center;height:20px;z-index:12");
  app.appendChild(refs.streak);

  // battlefield
  refs.field=el("div","position:relative;flex:1;min-height:120px;overflow:hidden");
  app.appendChild(refs.field);

  // rescued ribbon
  refs.ribbon=el("div","position:absolute;left:0;right:0;bottom:calc(148px + env(safe-area-inset-bottom));display:flex;justify-content:center;gap:4px;z-index:8;pointer-events:none");
  app.appendChild(refs.ribbon);

  // ship
  refs.ship=el("div","position:absolute;left:50%;top:94%;transform:translate(-50%,-50%);font-size:52px;z-index:6;animation:hover 2.4s ease-in-out infinite;filter:drop-shadow(0 0 10px "+lvl.accent+"88)","🚀");
  refs.field.appendChild(refs.ship);

  // answer bar
  var bar=el("div","background:"+C.hud+";padding:12px 16px calc(16px + env(safe-area-inset-bottom));z-index:12;border-top:2px solid "+lvl.accent+"55");
  refs.q=el("div","text-align:center;font-size:clamp(30px,5vh,42px);font-weight:900;margin-bottom:10px");
  bar.appendChild(refs.q);
  refs.choices=el("div","display:flex;gap:12px;max-width:560px;margin:0 auto");
  bar.appendChild(refs.choices);
  refs.hint=el("div","text-align:center;color:"+C.dim+";font-size:12px;margin-top:8px");
  bar.appendChild(refs.hint);
  app.appendChild(bar);

  updateHUD();
  renderProblem();
}

function updateHUD(){
  var lvl=LEVELS[Math.min(S.levelIdx,LEVELS.length-1)];
  refs.score.innerHTML=S.score+"<span style='font-size:12px;color:"+C.dim+";font-weight:700'> pts</span>";
  refs.lives.textContent="❤️".repeat(Math.max(0,S.lives))+"🖤".repeat(Math.max(0,3-S.lives));
  refs.levelName.textContent="LVL "+(S.levelIdx+1)+" · "+lvl.name;
  refs.levelName.style.color=lvl.accent;
  refs.dump.textContent="🥟 "+S.dumplings;
  var s="";
  if(S.streak>0){
    s="🔥 "+S.streak;
    if(S.streak>=9) s+=" · 💣 next!";
    else if(S.streak>=2 && S.streak%3===2) s+=" · ✨ next!";
  }
  refs.streak.innerHTML=s?"<span style='color:"+C.amber+";font-weight:800'>"+s+"</span>":"";
  // ribbon
  refs.ribbon.innerHTML="";
  S.rescued.slice(-8).forEach(function(c){ refs.ribbon.appendChild(el("span","font-size:20px;filter:drop-shadow(0 2px 4px #000)",c.emoji)); });
}

function renderProblem(){
  var lvl=LEVELS[Math.min(S.levelIdx,LEVELS.length-1)];
  var p=S.problem;
  refs.q.innerHTML=p.a+" <span style='color:"+C.magenta+"'>×</span> "+p.b+" <span style='color:"+C.dim+"'>=</span> <span style='color:"+C.cyan+"'>?</span>";
  refs.hint.textContent="Solve it to fire — blast the "+lvl.enemy+" before it reaches you";
  refs.choices.innerHTML="";
  p.choices.forEach(function(ch){
    var b=el("button","",""+ch); b.className="ans"; b.textContent=ch;
    b.onclick=function(){ answer(ch,b); };
    refs.choices.appendChild(b);
  });
}

// ═══════════════ TARGETS / LASERS as DOM nodes ═══════════════
function spawnTarget(){
  var lvl=LEVELS[Math.min(S.levelIdx,LEVELS.length-1)];
  var t={ id:++S.tid, x:8+Math.random()*84, y:-8-Math.random()*20,
    speed:0.05+Math.random()*0.06+S.levelIdx*0.015, dying:false };
  var node=el("div","position:absolute;left:"+t.x+"%;top:"+t.y+"%;transform:translate(-50%,-50%);font-size:40px;z-index:5;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))",lvl.enemy);
  t.node=node; refs.field.appendChild(node); S.targets.push(t);
}

function fireAt(ids){
  var lvl=LEVELS[Math.min(S.levelIdx,LEVELS.length-1)];
  S.targets.forEach(function(t){
    if(ids.indexOf(t.id)>=0 && !t.dying){
      t.dying=true;
      // laser
      var h=(94-t.y); if(h<0) h=0;
      var laser=el("div","position:absolute;left:"+t.x+"%;top:"+t.y+"%;width:5px;height:"+h+"%;background:linear-gradient("+lvl.accent+","+C.laser+");transform:translateX(-50%);transform-origin:bottom;border-radius:4px;box-shadow:0 0 12px "+C.laser+";animation:zap .22s ease-out forwards;z-index:4");
      refs.field.appendChild(laser);
      setTimeout(function(){ if(laser.parentNode) laser.parentNode.removeChild(laser); },240);
      // explosion
      t.node.textContent="💥"; t.node.style.fontSize="44px";
      t.node.style.transition="all .18s ease-out"; t.node.style.opacity="0";
      setTimeout(function(){ if(t.node.parentNode) t.node.parentNode.removeChild(t.node); },200);
    }
  });
  setTimeout(function(){ S.targets=S.targets.filter(function(t){ return ids.indexOf(t.id)<0; }); },210);
}

// ═══════════════ MAIN LOOP ═══════════════
function loop(now){
  if(!S.running) return;
  // spawn
  var cap=3+S.levelIdx*2;
  var liveCount=S.targets.filter(function(t){return !t.dying;}).length;
  if(now-S.lastSpawn>1400 && liveCount<cap){ spawnTarget(); S.lastSpawn=now; }
  // move
  var lost=0;
  S.targets.forEach(function(t){
    if(t.dying) return;
    t.y+=t.speed;
    if(t.y>=92){ t.escaped=true; lost++; if(t.node.parentNode) t.node.parentNode.removeChild(t.node); }
    else { t.node.style.top=t.y+"%"; }
  });
  if(lost>0){ S.targets=S.targets.filter(function(t){return !t.escaped;}); loseLife(lost); }
  if(S.running) requestAnimationFrame(loop);
}

function loseLife(n){
  S.streak=0;
  S.lives-=n;
  updateHUD();
  if(S.lives<=0){ S.lives=0; endGame(); }
}

// ═══════════════ ANSWER ═══════════════
function answer(choice, btn){
  if(S.feedback) return;
  var p=S.problem, correct=(choice===p.answer), key=p.a+"x"+p.b;
  S.feedback=true;
  // color buttons
  Array.prototype.forEach.call(refs.choices.children,function(b){
    var v=Number(b.textContent);
    if(v===p.answer) b.className="ans right";
    else if(b===btn) b.className="ans wrong";
  });

  if(!correct){
    S.misses[key]=(S.misses[key]||0)+1; S.streak=0; updateHUD();
    setTimeout(nextProblem,600); return;
  }

  var elapsed=Date.now()-S.asked, fast=elapsed<=FAST_MS;
  var ns=S.streak+1; S.streak=ns;
  if(S.misses[key]) S.misses[key]=Math.max(0,S.misses[key]-1);
  var gained=10+ns*2+(fast?5:0), popped=false;

  var live=S.targets.filter(function(t){return !t.dying;});
  var bomb=(ns>=10 && ns%10===0);
  var blast=(!bomb && ns>=3 && ns%3===0)?3:1;

  if(bomb){
    fireAt(live.map(function(t){return t.id;}));
    bombFlash();
    gained+=30+live.length*5;
    rewardPop("💣","MEGA BOMB! "+live.length+" cleared",C.red,true); popped=true;
  } else {
    var sorted=live.slice().sort(function(a,b){return b.y-a.y;});
    var hit=sorted.slice(0,blast).map(function(t){return t.id;});
    if(hit.length) fireAt(hit);
    if(blast>1){ gained+=10; rewardPop("✨","Triple shot! ×"+hit.length,C.magenta,true); popped=true; }
  }

  if(ns%5===0){ S.dumplings++; gained+=20; if(!popped){ rewardPop("🥟",ns+" streak — dumpling!",C.amber,true); popped=true; } }
  if(ns%8===0){ gained+=40; hatchEgg(); popped=true; }

  [p.a,p.b].forEach(function(nn){
    var other=(nn===p.a)?p.b:p.a;
    if(!S.tableProgress[nn]) S.tableProgress[nn]={};
    S.tableProgress[nn][other]=1;
    if(Object.keys(S.tableProgress[nn]).length>=MAX-1 && S.masteredTables.indexOf(nn)<0){
      S.masteredTables.push(nn); S.dumplings++; gained+=50;
      rewardPop("🏆",nn+"× table mastered!",C.magenta,true); popped=true;
    }
  });

  if(fast && !popped) rewardPop("⚡","Fast! +5",C.cyan,false);

  S.score+=gained;
  updateHUD();
  maybeLevelUp();
  setTimeout(nextProblem,300);
}

function nextProblem(){ S.problem=makeProblem(); S.asked=Date.now(); S.feedback=null; renderProblem(); }

function maybeLevelUp(){
  var cur=S.levelIdx;
  if(S.score>=LEVELS[cur].scoreToClear && cur<LEVELS.length-1){
    var nxt=cur+1; S.levelIdx=nxt;
    // clear field
    S.targets.forEach(function(t){ if(t.node.parentNode) t.node.parentNode.removeChild(t.node); });
    S.targets=[];
    var lvl=LEVELS[nxt];
    app.style.background="linear-gradient("+lvl.sky[0]+","+lvl.sky[1]+")";
    // restar
    refs.stars.innerHTML="";
    for(var i=0;i<26;i++) refs.stars.appendChild(el("div","position:absolute;top:"+((i*37)%100)+"%;left:"+((i*61)%100)+"%;width:3px;height:3px;border-radius:50%;background:"+lvl.stars+";opacity:.5;animation:twinkle "+(2+(i%4))+"s ease-in-out "+(i*0.2)+"s infinite"));
    refs.ship.style.filter="drop-shadow(0 0 10px "+lvl.accent+"88)";
    showBanner(lvl.name);
    rewardPop("🌍","Level "+(nxt+1)+": "+lvl.name+"!",lvl.accent,true);
    setTimeout(hatchEgg,1400);
    updateHUD();
  }
}

// ═══════════════ OVERLAYS ═══════════════
function confettiBurst(){
  var colors=[C.cyan,C.magenta,C.amber,C.green];
  for(var i=0;i<24;i++){
    var dx=(Math.random()-.5)*320, dy=-120-Math.random()*220, rot=Math.random()*720-360;
    var size=8+Math.random()*8;
    var p=el("div","position:absolute;top:40%;left:"+(40+Math.random()*20)+"%;width:"+size+"px;height:"+size+"px;background:"+colors[i%4]+";border-radius:"+(Math.random()>.5?"50%":"2px")+";--dx:"+dx+"px;--dy:"+dy+"px;--rot:"+rot+"deg;animation:confetti 1.2s cubic-bezier(.15,.6,.4,1) forwards");
    refs.overlay.appendChild(p);
    (function(node){ setTimeout(function(){ if(node.parentNode) node.parentNode.removeChild(node); },1300); })(p);
  }
}
function rewardPop(emoji,label,color,conf){
  if(conf) confettiBurst();
  var box=el("div","position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);text-align:center;animation:pop 1.3s cubic-bezier(.2,1.5,.4,1) forwards");
  box.appendChild(el("div","font-size:60px;filter:drop-shadow(0 4px 14px rgba(0,0,0,.6))",emoji));
  box.appendChild(el("div","margin-top:4px;background:"+color+";color:"+C.bg+";font-weight:900;padding:8px 20px;border-radius:999px;font-size:17px;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5);display:inline-block",label));
  refs.overlay.appendChild(box);
  setTimeout(function(){ if(box.parentNode) box.parentNode.removeChild(box); },1400);
}
function bombFlash(){
  var f=el("div","position:absolute;left:50%;top:50%;width:120%;height:120%;transform:translate(-50%,-50%);background:radial-gradient(circle,#fff8,transparent 60%);animation:boom .4s ease-out forwards");
  refs.overlay.appendChild(f);
  setTimeout(function(){ if(f.parentNode) f.parentNode.removeChild(f); },400);
}
function showBanner(name){
  var lvl=LEVELS[Math.min(S.levelIdx,LEVELS.length-1)];
  var b=el("div","position:absolute;top:30%;left:50%;font-weight:900;font-size:clamp(24px,5vw,40px);color:"+lvl.accent+";text-shadow:0 4px 20px #000;white-space:nowrap;animation:banner 1.7s ease-out forwards",name);
  refs.overlay.appendChild(b);
  setTimeout(function(){ if(b.parentNode) b.parentNode.removeChild(b); },1700);
}

// ═══════════════ HATCH ═══════════════
function hatchEgg(){
  var creature=CREATURES[Math.floor(Math.random()*CREATURES.length)];
  S.rescued.push(creature);
  var prev=S.collection[creature.emoji];
  S.collection[creature.emoji]={name:creature.name,count:(prev?prev.count:0)+1};
  save({best:Math.max(S.best,S.score),collection:S.collection});
  confettiBurst();
  updateHUD();

  var ov=el("div","position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 45%, rgba(255,240,210,.22), rgba(5,3,15,.86));pointer-events:none");
  var stage=el("div","position:relative;width:160px;height:160px;display:flex;align-items:center;justify-content:center");
  for(var i=0;i<5;i++) stage.appendChild(el("div","position:absolute;left:"+(10+i*20)+"%;bottom:30px;font-size:22px;opacity:0;animation:hearts 1.6s ease-out "+(0.9+i*0.12)+"s forwards","💕"));
  stage.appendChild(el("div","position:absolute;font-size:96px;animation:eggShake .7s ease-in-out, eggGone .5s ease-in .75s forwards","🥚"));
  stage.appendChild(el("div","font-size:92px;animation:hatchIn .7s cubic-bezier(.2,1.5,.4,1) 1.1s both;filter:drop-shadow(0 6px 16px rgba(0,0,0,.5))",creature.emoji));
  ov.appendChild(stage);
  var cap=el("div","margin-top:14px;text-align:center;animation:hatchIn .5s ease-out 1.5s both");
  cap.appendChild(el("div","color:"+C.amber+";font-weight:900;font-size:26px","You rescued a "+creature.name+"!"));
  cap.appendChild(el("div","color:"+C.text+";font-size:15px;margin-top:4px",creature.emoji+" is safe now 💛"));
  ov.appendChild(cap);
  refs.overlay.appendChild(ov);
  setTimeout(function(){ if(ov.parentNode) ov.parentNode.removeChild(ov); },2600);
}

// ═══════════════ GAME OVER ═══════════════
function endGame(){
  S.running=false;
  S.best=Math.max(S.best,S.score);
  save({best:S.best,collection:S.collection});
  S.screen="over";
  var lvl=LEVELS[Math.min(S.levelIdx,LEVELS.length-1)];
  app.className="center";
  app.setAttribute("style","position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;overflow-y:auto;background:radial-gradient(circle at 50% 20%, "+lvl.sky[1]+", "+C.bg+" 70%)");
  app.innerHTML="";
  app.appendChild(el("div","font-size:13px;letter-spacing:4px;color:"+C.cyan+";font-weight:700","SHIP DOWN!"));
  app.appendChild(el("div","font-size:clamp(52px,15vw,96px);font-weight:900;color:"+C.amber+";line-height:1",""+S.score));
  app.appendChild(el("div","color:"+C.dim+";font-size:15px","Reached "+lvl.name+" · "+((S.score>=S.best&&S.score>0)?"🎉 New best!":"Best: "+S.best)));

  // dumplings
  var dsec=el("div","margin-top:20px");
  dsec.appendChild(el("div","color:"+C.bamboo+";font-weight:700;font-size:13px;letter-spacing:1px","YOU EARNED "+S.dumplings+" DUMPLING"+(S.dumplings===1?"":"S")));
  if(S.dumplings>0){
    var basket=el("div","margin-top:12px;background:repeating-linear-gradient(90deg,"+C.bamboo+" 0 10px,"+C.bambooDark+" 10px 12px);border:4px solid "+C.bambooDark+";border-radius:20px;padding:16px 14px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:340px");
    var n=Math.min(S.dumplings,12);
    for(var i=0;i<n;i++){
      var d=el("div","position:relative;width:74px;height:64px");
      d.appendChild(el("div","position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px",PRIZES[i%PRIZES.length]));
      var top=el("div","position:absolute;top:6px;left:7px;width:60px;height:34px;background:linear-gradient(#FCEFD8,#E9D3AC);border-radius:30px 30px 8px 8px;box-shadow:inset 0 3px 0 rgba(255,255,255,.5);animation:dumpOpen .45s ease-in "+(0.12+i*0.09)+"s forwards");
      d.appendChild(top);
      d.appendChild(el("div","position:absolute;bottom:4px;left:7px;width:60px;height:30px;background:linear-gradient(#E9D3AC,"+C.bamboo+");border-radius:8px 8px 30px 30px"));
      basket.appendChild(d);
    }
    dsec.appendChild(basket);
  }
  app.appendChild(dsec);

  // rescued this run
  if(S.rescued.length>0){
    var rb=el("div","margin-top:18px;background:"+C.panel+";border-radius:16px;padding:14px 20px;max-width:340px");
    rb.appendChild(el("div","color:"+C.amber+";font-weight:800;font-size:13px;letter-spacing:1px","🐣 CREATURES RESCUED: "+S.rescued.length));
    var rrow=el("div","margin-top:10px;display:flex;flex-wrap:wrap;gap:10px;justify-content:center");
    S.rescued.forEach(function(c){
      var cell=el("div","text-align:center;width:54px");
      cell.appendChild(el("div","font-size:34px",c.emoji));
      cell.appendChild(el("div","font-size:10px;color:"+C.dim,c.name));
      rrow.appendChild(cell);
    });
    rb.appendChild(rrow);
    app.appendChild(rb);
  }

  if(S.masteredTables.length>0){
    app.appendChild(el("div","margin-top:16px;color:"+C.magenta+";font-weight:700","🏆 Mastered: "+S.masteredTables.slice().sort(function(a,b){return a-b;}).map(function(n){return n+"×";}).join(", ")));
  }

  var weak=Object.keys(S.misses).filter(function(k){return S.misses[k]>0;}).sort(function(a,b){return S.misses[b]-S.misses[a];}).slice(0,4);
  if(weak.length>0){
    var wb=el("div","margin-top:16px;background:"+C.panel+";border-radius:16px;padding:14px 22px;max-width:340px");
    wb.appendChild(el("div","color:"+C.dim+";font-weight:700;font-size:12px;letter-spacing:1px","WORTH PRACTISING"));
    var wr=el("div","margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center");
    weak.forEach(function(k){ wr.appendChild(el("span","background:"+C.panelLite+";border-radius:10px;padding:6px 12px;font-weight:700;font-size:14px",k.replace("x"," × "))); });
    wb.appendChild(wr); app.appendChild(wb);
  }

  var row=el("div","margin-top:24px;display:flex;gap:12px");
  var again=el("button","","Launch again ▸"); again.className="bigbtn"; again.onclick=startGame;
  var home=el("button","","Home"); home.className="bigbtn subbtn"; home.onclick=renderHome;
  row.appendChild(again); row.appendChild(home);
  app.appendChild(row);
}

// go
renderHome();
</script>
</body>
</html>
