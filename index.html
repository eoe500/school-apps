<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dumpling Blaster" />
<title>Dumpling Blaster</title>
<style>
  * { box-sizing:border-box; -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; margin:0; padding:0; }
  html,body { height:100%; background:#05030F; overscroll-behavior:none;
    font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif; color:#EAF0FF; touch-action:manipulation; }
  #app { position:fixed; inset:0; display:flex; flex-direction:column; overflow:hidden; }
  button { font-family:inherit; -webkit-user-select:none; user-select:none; touch-action:manipulation; }
  .center { align-items:center; justify-content:center; text-align:center; padding:24px; overflow-y:auto; }
  .bigbtn { background:linear-gradient(135deg,#FF4D8D,#FFC24B); color:#05030F; border:none;
    border-radius:16px; padding:16px 40px; font-size:22px; font-weight:800; cursor:pointer;
    letter-spacing:.5px; box-shadow:0 6px 0 rgba(0,0,0,.35); }
  .subbtn { background:#252A63; color:#EAF0FF; }
  .ans { flex:1; min-height:64px; padding:10px 0; font-size:clamp(24px,4vh,30px); font-weight:900;
    color:#EAF0FF; background:#252A63; border:none; border-radius:14px; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.4); transition:background .12s; }
  .ans.right { background:#4BE38A; color:#05030F; }
  .ans.wrong { background:#FF5C5C; color:#05030F; }
  @keyframes confetti { 0%{transform:translate(0,0) rotate(0);opacity:1} 100%{transform:translate(var(--dx),var(--dy)) rotate(var(--rot));opacity:0} }
  @keyframes pop { 0%{transform:translate(-50%,-50%) scale(.3);opacity:0} 20%{transform:translate(-50%,-50%) scale(1.15);opacity:1} 70%{transform:translate(-50%,-50%) scale(1);opacity:1} 100%{transform:translate(-50%,-90%) scale(.9);opacity:0} }
  @keyframes zap { 0%{transform:translateX(-50%) scaleY(0);opacity:1} 60%{transform:translateX(-50%) scaleY(1);opacity:1} 100%{transform:translateX(-50%) scaleY(1);opacity:0} }
  @keyframes boom { 0%{transform:translate(-50%,-50%) scale(.2);opacity:1} 100%{transform:translate(-50%,-50%) scale(2.4);opacity:0} }
  @keyframes twinkle { 0%,100%{opacity:.25} 50%{opacity:1} }
  @keyframes banner { 0%{transform:translateX(-50%) scale(.7);opacity:0} 20%{transform:translateX(-50%) scale(1);opacity:1} 80%{opacity:1} 100%{opacity:0} }
  @keyframes hover { 0%,100%{transform:translate(-50%,-50%) translateY(0)} 50%{transform:translate(-50%,-50%) translateY(-6px)} }
  @keyframes eggShake { 0%,100%{transform:rotate(0)} 20%{transform:rotate(-12deg)} 40%{transform:rotate(10deg)} 60%{transform:rotate(-8deg)} 80%{transform:rotate(6deg)} }
  @keyframes eggGone { 0%{transform:scale(1);opacity:1} 100%{transform:scale(1.4);opacity:0} }
  @keyframes hatchIn { 0%{transform:scale(0) translateY(20px);opacity:0} 55%{transform:scale(1.25);opacity:1} 75%{transform:scale(.92)} 100%{transform:scale(1);opacity:1} }
  @keyframes hearts { 0%{transform:translateY(0) scale(.6);opacity:0} 30%{opacity:1} 100%{transform:translateY(-70px) scale(1.1);opacity:0} }
  @keyframes ringPulse { 0%{transform:scale(.9);opacity:.5} 50%{transform:scale(1.05);opacity:1} 100%{transform:scale(.9);opacity:.5} }
  .timerbar { height:10px; border-radius:6px; background:#252A63; overflow:hidden; }
  .timerfill { height:100%; transition:width .1s linear; }
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
var C = { bg:"#05030F", hud:"#0E1030", panel:"#1A1E4A", panelLite:"#252A63",
  cyan:"#3DE1FF", magenta:"#FF4D8D", amber:"#FFC24B", green:"#4BE38A", red:"#FF5C5C",
  laser:"#7CFF6B", text:"#EAF0FF", dim:"#8B93C7", bamboo:"#C79A5B", bambooDark:"#9C7038", purple:"#C77CFF" };

var NUMBERS = [2,3,4,5,6,7,8,9,10];   // the times tables to master, in order
var FACTORS = [2,3,4,5,6,7,8,9,10];   // each number is tested ×2..×10
var STAGES = ["accuracy","speed","both"];
var SPEED_MS = 4000;                   // per-question limit in timed tests
var MIXED_AFTER = [4,7,10];            // after clearing these numbers, a mixed test

var CREATURES = [
  {emoji:"🐶",name:"Puppy"},{emoji:"🐱",name:"Kitten"},{emoji:"🐣",name:"Chick"},
  {emoji:"🐰",name:"Bunny"},{emoji:"🦊",name:"Fox kit"},{emoji:"🐼",name:"Panda cub"},
  {emoji:"🐨",name:"Koala"},{emoji:"🦄",name:"Baby unicorn"},{emoji:"🐧",name:"Penguin"},
  {emoji:"🦖",name:"Lil dino"},{emoji:"🐙",name:"Octo-pal"},{emoji:"🦔",name:"Hedgehog"},
  {emoji:"🦕",name:"Bronto baby"},{emoji:"🐥",name:"Ducky"},{emoji:"🦉",name:"Owlet"},
  {emoji:"🐢",name:"Turtle"},{emoji:"🐝",name:"Bumble"},{emoji:"🦋",name:"Flutter"}
];
// backdrop themes cycle as she advances numbers
var THEMES = [
  {sky:["#0A0620","#1A1050"], enemy:"👾", accent:"#7CFF6B", stars:"#ffffff"},
  {sky:["#2A0A3E","#5B1E6E"], enemy:"🛸", accent:"#FF4D8D", stars:"#FFD6F5"},
  {sky:["#241203","#6E3A1E"], enemy:"☄️", accent:"#FFC24B", stars:"#FFE9C7"},
  {sky:["#052033","#0E5B6E"], enemy:"❄️", accent:"#3DE1FF", stars:"#D7F6FF"},
  {sky:["#1A0322","#3A0C4E"], enemy:"🌟", accent:"#C77CFF", stars:"#F0D7FF"}
];

// ── persistence ──
function load(){ try{ return JSON.parse(localStorage.getItem("dumplingBlasterV2"))||{}; }catch(e){ return {}; } }
function save(){ try{ localStorage.setItem("dumplingBlasterV2", JSON.stringify({
  progress:S.progress, collection:S.collection, mixedDone:S.mixedDone })); }catch(e){} }
var saved = load();

var S = {
  screen:"map",
  progress: saved.progress || {},   // { "2":{accuracy:true,speed:false,both:false}, ... }
  collection: saved.collection || {},
  mixedDone: saved.mixedDone || {},  // { "4":true }
  // transient run state
  number:null, stage:null, mixed:false,
  queue:[], idx:0, correct:0, total:0, missedFacts:{},
  // shooter
  targets:[], lasers:[], tid:0, running:false, lastSpawn:0, streak:0,
  // test
  testTimer:null, testDeadline:0, testStart:0,
  problem:null, feedback:false
};

var app = document.getElementById("app");
function el(tag, style, html){ var e=document.createElement(tag); if(style)e.setAttribute("style",style); if(html!=null)e.innerHTML=html; return e; }
function themeFor(number){ return THEMES[(NUMBERS.indexOf(number)) % THEMES.length]; }

function stageState(number){ return S.progress[String(number)] || {accuracy:false,speed:false,both:false}; }
function numberDone(number){ var st=stageState(number); return st.accuracy&&st.speed&&st.both; }
function nextStage(number){ var st=stageState(number); for(var i=0;i<STAGES.length;i++){ if(!st[STAGES[i]]) return STAGES[i]; } return null; }
function numberUnlocked(number){
  var idx=NUMBERS.indexOf(number);
  if(idx===0) return true;
  return numberDone(NUMBERS[idx-1]);
}

// facts for a number: number×2 .. number×10
function factsFor(number){ return FACTORS.map(function(f){ return {a:number,b:f}; }); }
function allLearnedFacts(){
  var out=[];
  NUMBERS.forEach(function(n){ if(numberDone(n)) out=out.concat(factsFor(n)); });
  return out;
}
function distractors(ans,a,b){
  var set={}; set[ans]=1; var guard=0;
  while(Object.keys(set).length<3 && guard++<40){
    var off=ans+(Math.floor(Math.random()*7)-3)*(Math.random()>.5?a:b);
    if(off>0) set[off]=1;
  }
  var k=2; while(Object.keys(set).length<3){ set[ans+k]=1; k++; }
  return Object.keys(set).map(Number).sort(function(){return Math.random()-.5;});
}

// ═══════════════ MAP / MENU ═══════════════
function renderMap(){
  S.screen="map"; stopTest();
  app.className="center";
  app.setAttribute("style","position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;padding:20px 16px calc(20px + env(safe-area-inset-bottom));overflow-y:auto;background:radial-gradient(circle at 50% 0%, #1A1050, "+C.bg+" 70%)");
  app.innerHTML="";

  app.appendChild(el("div","font-size:12px;letter-spacing:4px;color:"+C.cyan+";font-weight:700;margin-top:8px","TIMES-TABLE MISSION"));
  app.appendChild(el("h1","font-size:clamp(32px,9vw,60px);margin:6px 0 2px;line-height:.95;font-weight:900;background:linear-gradient(135deg,"+C.cyan+","+C.magenta+");-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent","Dumpling Blaster"));
  app.appendChild(el("p","color:"+C.dim+";max-width:420px;margin:4px auto 0;font-size:14px","Blast invaders to warm up, then pass the test! Each number has 3 tests — <b style='color:"+C.text+"'>accuracy</b>, <b style='color:"+C.text+"'>speed</b>, then <b style='color:"+C.text+"'>both</b>. Clear all three to rescue a creature. 🥚"));

  // number tiles
  var grid=el("div","display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:460px;margin-top:16px");
  NUMBERS.forEach(function(n){
    var st=stageState(n), done=numberDone(n), unlocked=numberUnlocked(n);
    var starCount=(st.accuracy?1:0)+(st.speed?1:0)+(st.both?1:0);
    var th=themeFor(n);
    var tileBg = done ? "linear-gradient(135deg,"+C.green+"33,"+C.panel+")" : unlocked ? C.panel : "#141633";
    var tile=el("div","width:132px;border-radius:16px;padding:12px 10px;background:"+tileBg+";border:2px solid "+(done?C.green:unlocked?th.accent+"66":"#222")+";position:relative;"+(unlocked?"cursor:pointer":"opacity:.55"));
    tile.appendChild(el("div","font-size:30px;font-weight:900;color:"+(unlocked?C.text:C.dim),(unlocked?"":"🔒 ")+n+"×"));
    // stage pips
    var pips=el("div","display:flex;gap:5px;justify-content:center;margin-top:6px");
    STAGES.forEach(function(sg){
      var on=st[sg];
      var lbl=sg==="accuracy"?"🎯":sg==="speed"?"⚡":"⭐";
      pips.appendChild(el("div","font-size:14px;opacity:"+(on?1:.28),lbl));
    });
    tile.appendChild(pips);
    tile.appendChild(el("div","font-size:10px;color:"+C.dim+";margin-top:4px", done?"MASTERED ✓":unlocked?(starCount+"/3 passed"):"locked"));
    if(unlocked) tile.onclick=function(){ openNumber(n); };
    grid.appendChild(tile);

    // insert a mixed-test tile after certain numbers
    if(MIXED_AFTER.indexOf(n)>=0){
      var mReady = MIXED_AFTER.indexOf(n)>=0 && countClearedUpTo(n);
      var mDone = S.mixedDone[String(n)];
      var mUnlocked = numberDone(n);
      var mtile=el("div","width:132px;border-radius:16px;padding:12px 10px;background:"+(mDone?"linear-gradient(135deg,"+C.amber+"33,"+C.panel+")":mUnlocked?"linear-gradient(135deg,"+C.magenta+"22,"+C.panel+")":"#141633")+";border:2px dashed "+(mDone?C.amber:mUnlocked?C.magenta:"#222")+";position:relative;"+(mUnlocked?"cursor:pointer":"opacity:.55"));
      mtile.appendChild(el("div","font-size:22px;font-weight:900;color:"+(mUnlocked?C.text:C.dim),(mUnlocked?"":"🔒 ")+"🌈 Mixed"));
      mtile.appendChild(el("div","font-size:10px;color:"+C.dim+";margin-top:8px", mDone?"CLEARED ✓":mUnlocked?"up to "+n+"× — tap":"clear "+n+"× first"));
      if(mUnlocked) mtile.onclick=function(){ openMixed(n); };
      grid.appendChild(mtile);
    }
  });
  app.appendChild(grid);

  // collection
  var kinds=Object.keys(S.collection);
  if(kinds.length>0){
    var box=el("div","margin-top:18px;background:"+C.panel+";border-radius:16px;padding:12px 18px;max-width:420px");
    box.appendChild(el("div","color:"+C.amber+";font-weight:800;font-size:12px;letter-spacing:1px","🏡 RESCUED FRIENDS — "+kinds.length+"/"+CREATURES.length));
    var row=el("div","margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center");
    kinds.forEach(function(emoji){ var info=S.collection[emoji];
      var cell=el("div","text-align:center;width:42px;position:relative");
      cell.appendChild(el("div","font-size:26px",emoji));
      if(info.count>1) cell.appendChild(el("div","position:absolute;top:-4px;right:0;background:"+C.magenta+";color:"+C.bg+";font-size:9px;font-weight:900;border-radius:999px;padding:0 4px","×"+info.count));
      row.appendChild(cell);
    });
    box.appendChild(row);
    var reset=el("div","margin-top:8px;color:"+C.dim+";font-size:10px;text-decoration:underline;cursor:pointer","Reset all progress");
    reset.onclick=function(){ if(confirm("Reset ALL progress, tests passed, and rescued friends?")){ S.progress={}; S.collection={}; S.mixedDone={}; save(); renderMap(); } };
    box.appendChild(reset);
    app.appendChild(box);
  }
}
function countClearedUpTo(n){ var ok=true; for(var i=0;i<NUMBERS.length;i++){ if(NUMBERS[i]>n) break; if(!numberDone(NUMBERS[i])) ok=false; } return ok; }

// ═══════════════ NUMBER INTRO (which stage is next) ═══════════════
function openNumber(n){
  S.number=n; S.mixed=false;
  var stage=nextStage(n);
  if(!stage){ renderMap(); return; }
  S.stage=stage;
  renderStageIntro();
}
function openMixed(n){
  S.number=n; S.mixed=true; S.stage="both";
  renderStageIntro();
}

function renderStageIntro(){
  S.screen="intro"; stopTest();
  var n=S.number, stage=S.stage, th=themeFor(n||2);
  var stageName = stage==="accuracy"?"Accuracy Test":stage==="speed"?"Speed Test":S.mixed?"Mixed Mastery Test":"Mastery Test (Both)";
  var stageDesc = stage==="accuracy"?"Get every fact right. Take your time — misses come back around.":
                  stage==="speed"?"Beat the clock on every fact. Quick answers!":
                  "Correct AND fast on every fact. Show true mastery!";
  app.className="center";
  app.setAttribute("style","position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;overflow-y:auto;background:radial-gradient(circle at 50% 20%, "+th.sky[1]+", "+C.bg+" 70%)");
  app.innerHTML="";
  app.appendChild(el("div","font-size:13px;letter-spacing:4px;color:"+th.accent+";font-weight:700", S.mixed?"MIXED CHALLENGE":n+"× TABLE"));
  app.appendChild(el("div","font-size:clamp(30px,8vw,52px);font-weight:900;margin-top:4px", (stage==="accuracy"?"🎯 ":stage==="speed"?"⚡ ":"⭐ ")+stageName));
  app.appendChild(el("p","color:"+C.dim+";max-width:380px;margin-top:12px;font-size:16px", stageDesc));
  app.appendChild(el("div","color:"+C.text+";margin-top:14px;font-size:15px","First, a shooter warm-up 🚀 — then the test."));

  var go=el("button","","Start warm-up ▸"); go.className="bigbtn"; go.style.marginTop="22px";
  go.onclick=startShooter;
  app.appendChild(go);
  var back=el("button","","← Map"); back.className="bigbtn subbtn"; back.style.cssText+=";margin-top:12px;padding:10px 24px;font-size:16px";
  back.onclick=renderMap;
  app.appendChild(back);
}

// ═══════════════ SHOOTER WARM-UP ═══════════════
var R={};
function buildFacts(){
  // the practice/test pool
  if(S.mixed){ return allLearnedFacts().sort(function(){return Math.random()-.5;}).slice(0, 12); }
  return factsFor(S.number);
}
function shooterProblem(){
  var facts=buildFacts();
  var f=facts[Math.floor(Math.random()*facts.length)];
  var ans=f.a*f.b;
  return {a:f.a,b:f.b,answer:ans,choices:distractors(ans,f.a,f.b)};
}

function startShooter(){
  S.screen="shooter"; S.running=true; S.streak=0;
  S.targets=[]; S.lasers=[]; S.tid=0; S.lastSpawn=performance.now();
  S.shooterHits=0; S.shooterGoal=8; // blast 8 to earn the test
  S.problem=shooterProblem(); S.feedback=false;
  buildShooter();
  requestAnimationFrame(shLoop);
}

function buildShooter(){
  var th=themeFor(S.number||2);
  app.className="";
  app.setAttribute("style","position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient("+th.sky[0]+","+th.sky[1]+")");
  app.innerHTML="";
  var stars=el("div","position:absolute;inset:0;z-index:1;pointer-events:none");
  for(var i=0;i<24;i++) stars.appendChild(el("div","position:absolute;top:"+((i*37)%100)+"%;left:"+((i*61)%100)+"%;width:3px;height:3px;border-radius:50%;background:"+th.stars+";opacity:.5;animation:twinkle "+(2+(i%4))+"s ease-in-out "+(i*0.2)+"s infinite"));
  app.appendChild(stars);
  R.overlay=el("div","position:absolute;inset:0;z-index:26;pointer-events:none"); app.appendChild(R.overlay);

  var hud=el("div","display:flex;justify-content:space-between;align-items:center;padding:12px 16px 4px;z-index:12");
  R.prog=el("div","font-weight:900;font-size:15px;color:"+th.accent);
  R.streak=el("div","font-weight:800;font-size:14px;color:"+C.amber);
  var quit=el("div","font-size:13px;color:"+C.dim+";text-decoration:underline;cursor:pointer","Map");
  quit.onclick=function(){ S.running=false; renderMap(); };
  hud.appendChild(R.prog); hud.appendChild(R.streak); hud.appendChild(quit);
  app.appendChild(hud);

  R.field=el("div","position:relative;flex:1;min-height:120px;overflow:hidden"); app.appendChild(R.field);
  R.ship=el("div","position:absolute;left:50%;top:94%;transform:translate(-50%,-50%);font-size:50px;z-index:6;animation:hover 2.4s ease-in-out infinite;filter:drop-shadow(0 0 10px "+th.accent+"88)","🚀");
  R.field.appendChild(R.ship);

  var bar=el("div","background:"+C.hud+";padding:12px 16px calc(16px + env(safe-area-inset-bottom));z-index:12;border-top:2px solid "+th.accent+"55");
  R.q=el("div","text-align:center;font-size:clamp(28px,5vh,40px);font-weight:900;margin-bottom:10px"); bar.appendChild(R.q);
  R.choices=el("div","display:flex;gap:12px;max-width:560px;margin:0 auto"); bar.appendChild(R.choices);
  R.hint=el("div","text-align:center;color:"+C.dim+";font-size:12px;margin-top:8px"); bar.appendChild(R.hint);
  app.appendChild(bar);
  shHud(); shRenderProblem();
}
function shHud(){
  R.prog.textContent="🎯 Blast "+S.shooterHits+" / "+S.shooterGoal;
  R.streak.textContent=S.streak>1?("🔥 "+S.streak):"";
}
function shRenderProblem(){
  var th=themeFor(S.number||2), p=S.problem;
  R.q.innerHTML=p.a+" <span style='color:"+C.magenta+"'>×</span> "+p.b+" <span style='color:"+C.dim+"'>=</span> <span style='color:"+C.cyan+"'>?</span>";
  R.hint.textContent="Answer to fire — reach the goal to unlock the test";
  R.choices.innerHTML="";
  p.choices.forEach(function(ch){ var b=el("button","",""+ch); b.className="ans"; b.textContent=ch; b.onclick=function(){ shAnswer(ch,b); }; R.choices.appendChild(b); });
}
function shSpawn(){
  var th=themeFor(S.number||2);
  var t={id:++S.tid,x:8+Math.random()*84,y:-8-Math.random()*16,speed:0.05+Math.random()*0.05,dying:false};
  var node=el("div","position:absolute;left:"+t.x+"%;top:"+t.y+"%;transform:translate(-50%,-50%);font-size:38px;z-index:5;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))",th.enemy);
  t.node=node; R.field.appendChild(node); S.targets.push(t);
}
function shFire(ids){
  var th=themeFor(S.number||2);
  S.targets.forEach(function(t){ if(ids.indexOf(t.id)>=0 && !t.dying){ t.dying=true;
    var h=(94-t.y); if(h<0)h=0;
    var laser=el("div","position:absolute;left:"+t.x+"%;top:"+t.y+"%;width:5px;height:"+h+"%;background:linear-gradient("+th.accent+","+C.laser+");transform:translateX(-50%);transform-origin:bottom;border-radius:4px;box-shadow:0 0 12px "+C.laser+";animation:zap .22s ease-out forwards;z-index:4");
    R.field.appendChild(laser); setTimeout(function(){ if(laser.parentNode)laser.parentNode.removeChild(laser); },240);
    t.node.textContent="💥"; t.node.style.opacity="0"; t.node.style.transition="all .18s ease-out";
    setTimeout(function(){ if(t.node.parentNode)t.node.parentNode.removeChild(t.node); },200);
  }});
  setTimeout(function(){ S.targets=S.targets.filter(function(t){return ids.indexOf(t.id)<0;}); },210);
}
function shLoop(now){
  if(!S.running || S.screen!=="shooter") return;
  if(now-S.lastSpawn>1300 && S.targets.filter(function(t){return !t.dying;}).length<4){ shSpawn(); S.lastSpawn=now; }
  S.targets.forEach(function(t){ if(t.dying)return; t.y+=t.speed; if(t.y>=94){ if(t.node.parentNode)t.node.parentNode.removeChild(t.node); t.escaped=true; } else t.node.style.top=t.y+"%"; });
  S.targets=S.targets.filter(function(t){return !t.escaped;});
  requestAnimationFrame(shLoop);
}
function shAnswer(choice,btn){
  if(S.feedback) return;
  var p=S.problem, correct=(choice===p.answer);
  S.feedback=true;
  Array.prototype.forEach.call(R.choices.children,function(b){ var v=Number(b.textContent); if(v===p.answer)b.className="ans right"; else if(b===btn)b.className="ans wrong"; });
  if(correct){
    S.streak++; S.shooterHits++;
    var live=S.targets.filter(function(t){return !t.dying;});
    var blast=(S.streak%3===0)?3:1;
    var sorted=live.slice().sort(function(a,b){return b.y-a.y;});
    var hit=sorted.slice(0,blast).map(function(t){return t.id;});
    if(hit.length) shFire(hit);
    if(blast>1 && hit.length>1) rewardPop("✨","Triple shot!",C.magenta,false);
    shHud();
    if(S.shooterHits>=S.shooterGoal){ S.running=false; setTimeout(startTest,500); return; }
    setTimeout(function(){ S.problem=shooterProblem(); S.feedback=false; shRenderProblem(); },260);
  } else {
    S.streak=0; shHud();
    setTimeout(function(){ S.problem=shooterProblem(); S.feedback=false; shRenderProblem(); },600);
  }
}

// ═══════════════ THE TEST (calm, focused, timed) ═══════════════
function startTest(){
  S.screen="test"; stopTest();
  // build the queue = every fact once, shuffled
  var facts = S.mixed ? allLearnedFacts() : factsFor(S.number);
  facts = facts.slice().sort(function(){return Math.random()-.5;});
  if(S.mixed) facts=facts.slice(0,15); // cap mixed length
  S.queue=facts; S.idx=0; S.correct=0; S.total=facts.length; S.missedFacts={};
  S.feedback=false;
  buildTestShell();
  nextTestQ();
}
function stopTest(){ if(S.testTimer){ clearInterval(S.testTimer); S.testTimer=null; } }

function buildTestShell(){
  var th=themeFor(S.number||2);
  var timed = (S.stage==="speed"||S.stage==="both");
  app.className="";
  app.setAttribute("style","position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;background:radial-gradient(circle at 50% 25%, "+th.sky[1]+", "+C.bg+" 80%)");
  app.innerHTML="";
  R.overlay=el("div","position:absolute;inset:0;z-index:26;pointer-events:none"); app.appendChild(R.overlay);

  var top=el("div","display:flex;justify-content:space-between;align-items:center;padding:14px 18px 6px;z-index:5");
  var label = S.mixed?"🌈 MIXED TEST":(S.number+"× "+(S.stage==="accuracy"?"ACCURACY":S.stage==="speed"?"SPEED":"MASTERY"));
  top.appendChild(el("div","font-weight:800;font-size:14px;letter-spacing:1px;color:"+th.accent,label));
  var quit=el("div","font-size:13px;color:"+C.dim+";text-decoration:underline;cursor:pointer","Map");
  quit.onclick=function(){ stopTest(); renderMap(); };
  top.appendChild(quit);
  app.appendChild(top);

  // progress dots
  R.dots=el("div","display:flex;gap:5px;justify-content:center;flex-wrap:wrap;padding:4px 16px;z-index:5");
  app.appendChild(R.dots);

  var mid=el("div","flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px");
  if(timed){
    R.timerWrap=el("div","width:min(420px,86vw);margin-bottom:22px");
    var tb=el("div","","" ); tb.className="timerbar";
    R.timerFill=el("div","width:100%;background:"+C.green); R.timerFill.className="timerfill";
    tb.appendChild(R.timerFill); R.timerWrap.appendChild(tb);
    mid.appendChild(R.timerWrap);
  }
  R.q=el("div","font-size:clamp(44px,12vw,84px);font-weight:900;text-align:center"); mid.appendChild(R.q);
  R.fb=el("div","height:26px;margin-top:8px;font-size:16px;font-weight:700"); mid.appendChild(R.fb);
  app.appendChild(mid);

  var bar=el("div","padding:12px 16px calc(20px + env(safe-area-inset-bottom));z-index:5");
  R.choices=el("div","display:flex;gap:12px;max-width:560px;margin:0 auto"); bar.appendChild(R.choices);
  app.appendChild(bar);
  drawDots();
}
function drawDots(){
  R.dots.innerHTML="";
  for(var i=0;i<S.total;i++){
    var c = i<S.idx ? (S.queue[i].wasWrong?C.red:C.green) : (i===S.idx?themeFor(S.number||2).accent:C.panelLite);
    R.dots.appendChild(el("div","width:9px;height:9px;border-radius:50%;background:"+c));
  }
}
function nextTestQ(){
  stopTest();
  if(S.idx>=S.queue.length){ return finishTest(); }
  var f=S.queue[S.idx]; var ans=f.a*f.b;
  S.problem={a:f.a,b:f.b,answer:ans,choices:distractors(ans,f.a,f.b)};
  S.feedback=false;
  R.q.innerHTML=f.a+" <span style='color:"+C.magenta+"'>×</span> "+f.b;
  R.fb.textContent=""; R.fb.style.color=C.dim;
  R.choices.innerHTML="";
  S.problem.choices.forEach(function(ch){ var b=el("button","",""+ch); b.className="ans"; b.textContent=ch; b.onclick=function(){ testAnswer(ch,b); }; R.choices.appendChild(b); });
  drawDots();
  // timer for speed/both
  if(S.stage==="speed"||S.stage==="both"){
    S.testStart=Date.now(); S.testDeadline=S.testStart+SPEED_MS;
    if(R.timerFill) R.timerFill.style.width="100%";
    S.testTimer=setInterval(function(){
      var left=S.testDeadline-Date.now(), frac=Math.max(0,left/SPEED_MS);
      if(R.timerFill){ R.timerFill.style.width=(frac*100)+"%"; R.timerFill.style.background=frac<0.3?C.red:frac<0.6?C.amber:C.green; }
      if(left<=0){ timeUp(); }
    },80);
  }
}
function testAnswer(choice,btn){
  if(S.feedback) return;
  S.feedback=true; stopTest();
  var p=S.problem, correct=(choice===p.answer);
  var fast=(Date.now()-S.testStart)<=SPEED_MS;
  Array.prototype.forEach.call(R.choices.children,function(b){ var v=Number(b.textContent); if(v===p.answer)b.className="ans right"; else if(b===btn)b.className="ans wrong"; });

  var pass;
  if(S.stage==="accuracy") pass=correct;
  else if(S.stage==="speed") pass=correct && fast;   // timer would've fired if too slow
  else pass=correct && fast;

  if(pass){
    S.correct++;
    R.fb.textContent="Nice! ✓"; R.fb.style.color=C.green;
    S.idx++;
  } else {
    // wrong (or too slow but answered): mark, re-queue this fact at the end
    R.fb.textContent = correct?"Too slow — it'll come back":"Not quite — "+p.a+"×"+p.b+"="+p.answer;
    R.fb.style.color=C.red;
    var key=p.a+"x"+p.b; S.missedFacts[key]=(S.missedFacts[key]||0)+1;
    var moved=S.queue[S.idx]; moved.wasWrong=true;
    S.queue.splice(S.idx,1); S.queue.push(moved); S.total=S.queue.length;
    // accuracy & both: must eventually get all right, so re-queue keeps going
  }
  drawDots();
  setTimeout(nextTestQ, pass?500:1100);
}
function timeUp(){
  if(S.feedback) return;
  S.feedback=true; stopTest();
  var p=S.problem;
  Array.prototype.forEach.call(R.choices.children,function(b){ if(Number(b.textContent)===p.answer)b.className="ans right"; });
  R.fb.textContent="⏰ Time! "+p.a+"×"+p.b+"="+p.answer; R.fb.style.color=C.red;
  var key=p.a+"x"+p.b; S.missedFacts[key]=(S.missedFacts[key]||0)+1;
  var moved=S.queue[S.idx]; moved.wasWrong=true;
  S.queue.splice(S.idx,1); S.queue.push(moved); S.total=S.queue.length;
  drawDots();
  setTimeout(nextTestQ,1200);
}

// how the test ends: queue empties only when every fact was answered correctly (misses re-queue)
function finishTest(){
  stopTest();
  // passed! record it
  if(S.mixed){
    S.mixedDone[String(S.number)]=true;
    save();
    passScreen(true, "Mixed test cleared!", true);
  } else {
    var st=S.progress[String(S.number)]||{accuracy:false,speed:false,both:false};
    st[S.stage]=true;
    S.progress[String(S.number)]=st;
    var justMastered = st.accuracy&&st.speed&&st.both;
    save();
    if(justMastered){ hatchEgg(); }
    passScreen(justMastered, justMastered?(S.number+"× TABLE MASTERED!"):(cap(S.stage)+" test passed!"), justMastered);
  }
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function passScreen(big, msg, celebrate){
  S.screen="pass"; stopTest();
  var th=themeFor(S.number||2);
  app.className="center";
  app.setAttribute("style","position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;overflow-y:auto;background:radial-gradient(circle at 50% 25%, "+th.sky[1]+", "+C.bg+" 75%)");
  app.innerHTML="";
  if(celebrate) confettiBurst2();
  app.appendChild(el("div","font-size:64px", big?"🏆":"✅"));
  app.appendChild(el("div","font-size:clamp(26px,7vw,44px);font-weight:900;color:"+C.amber+";margin-top:6px", msg));

  // show what's next
  var nextMsg="";
  if(S.mixed){ nextMsg="Great mixing! Keep going on the next numbers."; }
  else if(big){ nextMsg="You rescued a creature! 🥚 The next number is unlocked."; }
  else {
    var ns=nextStage(S.number);
    nextMsg = ns ? ("Next up: the "+cap(ns)+" test.") : "";
  }
  if(nextMsg) app.appendChild(el("p","color:"+C.dim+";max-width:360px;margin-top:12px;font-size:16px",nextMsg));

  var cont=el("button","", big||S.mixed?"Back to map ▸":"Next test ▸"); cont.className="bigbtn"; cont.style.marginTop="22px";
  cont.onclick=function(){
    if(big||S.mixed){ renderMap(); }
    else { S.stage=nextStage(S.number); if(S.stage) renderStageIntro(); else renderMap(); }
  };
  app.appendChild(cont);
  var map=el("button","","← Map"); map.className="bigbtn subbtn"; map.style.cssText+=";margin-top:12px;padding:10px 24px;font-size:16px"; map.onclick=renderMap;
  app.appendChild(map);
}

// ═══════════════ OVERLAYS ═══════════════
function confettiBurst(){ _conf(R.overlay); }
function confettiBurst2(){ var o=el("div","position:absolute;inset:0;z-index:60;pointer-events:none"); app.appendChild(o); _conf(o); setTimeout(function(){ if(o.parentNode)o.parentNode.removeChild(o); },1400); }
function _conf(host){
  if(!host) return;
  var colors=[C.cyan,C.magenta,C.amber,C.green];
  for(var i=0;i<24;i++){ var dx=(Math.random()-.5)*320,dy=-120-Math.random()*220,rot=Math.random()*720-360,size=8+Math.random()*8;
    var p=el("div","position:absolute;top:42%;left:"+(40+Math.random()*20)+"%;width:"+size+"px;height:"+size+"px;background:"+colors[i%4]+";border-radius:"+(Math.random()>.5?"50%":"2px")+";--dx:"+dx+"px;--dy:"+dy+"px;--rot:"+rot+"deg;animation:confetti 1.2s cubic-bezier(.15,.6,.4,1) forwards");
    host.appendChild(p); (function(node){ setTimeout(function(){ if(node.parentNode)node.parentNode.removeChild(node); },1300); })(p);
  }
}
function rewardPop(emoji,label,color,conf){
  if(conf) confettiBurst();
  if(!R.overlay) return;
  var box=el("div","position:absolute;top:34%;left:50%;transform:translate(-50%,-50%);text-align:center;animation:pop 1.3s cubic-bezier(.2,1.5,.4,1) forwards");
  box.appendChild(el("div","font-size:54px;filter:drop-shadow(0 4px 14px rgba(0,0,0,.6))",emoji));
  box.appendChild(el("div","margin-top:4px;background:"+color+";color:"+C.bg+";font-weight:900;padding:7px 18px;border-radius:999px;font-size:16px;white-space:nowrap;display:inline-block",label));
  R.overlay.appendChild(box);
  setTimeout(function(){ if(box.parentNode)box.parentNode.removeChild(box); },1400);
}
function hatchEgg(){
  var creature=CREATURES[Math.floor(Math.random()*CREATURES.length)];
  var prev=S.collection[creature.emoji];
  S.collection[creature.emoji]={name:creature.name,count:(prev?prev.count:0)+1};
  save();
  var host=el("div","position:absolute;inset:0;z-index:70;pointer-events:none"); app.appendChild(host); _conf(host);
  var ov=el("div","position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 45%, rgba(255,240,210,.22), rgba(5,3,15,.7))");
  var stage=el("div","position:relative;width:160px;height:160px;display:flex;align-items:center;justify-content:center");
  for(var i=0;i<5;i++) stage.appendChild(el("div","position:absolute;left:"+(10+i*20)+"%;bottom:30px;font-size:22px;opacity:0;animation:hearts 1.6s ease-out "+(0.9+i*0.12)+"s forwards","💕"));
  stage.appendChild(el("div","position:absolute;font-size:96px;animation:eggShake .7s ease-in-out, eggGone .5s ease-in .75s forwards","🥚"));
  stage.appendChild(el("div","font-size:92px;animation:hatchIn .7s cubic-bezier(.2,1.5,.4,1) 1.1s both;filter:drop-shadow(0 6px 16px rgba(0,0,0,.5))",creature.emoji));
  ov.appendChild(stage);
  var cap2=el("div","margin-top:14px;text-align:center;animation:hatchIn .5s ease-out 1.5s both");
  cap2.appendChild(el("div","color:"+C.amber+";font-weight:900;font-size:24px","You rescued a "+creature.name+"!"));
  cap2.appendChild(el("div","color:"+C.text+";font-size:15px;margin-top:4px",creature.emoji+" is safe now 💛"));
  ov.appendChild(cap2); host.appendChild(ov);
  setTimeout(function(){ if(host.parentNode)host.parentNode.removeChild(host); },2600);
}

renderMap();
</script>
